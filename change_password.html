<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password -OffiAttend</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .change-password-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .change-password-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .change-password-header h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        
        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #4ebba7;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .error {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .success {
            color: #28a745;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
  <!-- Mobile Menu Toggle -->
  <button class="mobile-menu-toggle" aria-label="Toggle menu">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <div class="mobile-overlay"></div>

    <div class="change-password-container">
        <div class="change-password-header">
            <h2>🔐 Change Password</h2>
            <p>You must change your password to continue</p>
        </div>
        
        <div class="alert">
            <strong>First-time login detected!</strong><br>
            Please set a new password for your account.
        </div>
        
        <form id="changePasswordForm">
            <div class="form-group">
                <label for="currentPassword">Current Password</label>
                <input type="password" id="currentPassword" name="currentPassword" required>
                <div id="currentPasswordError" class="error"></div>
            </div>
            
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" name="newPassword" required>
                <div class="password-requirements">
                    Password must contain: at least 8 characters, 1 uppercase, 1 lowercase, 1 number, 1 special character (@, $, #, .)
                </div>
                <div id="newPasswordError" class="error"></div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
                <div id="confirmPasswordError" class="error"></div>
            </div>
            
            <button type="submit" class="btn" id="changePasswordBtn">
                Change Password
            </button>
            
            <div id="message" class="success"></div>
        </form>
    </div>

    <script src="js/app.js"></script>
    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        // Get current user info
        function getCurrentUser() {
            return window.OfficeApp && window.OfficeApp.currentUser();
        }
        
        // Validate password
        function validatePassword(password) {
            if (password.length < 8) {
                return { valid: false, error: "Password must be at least 8 characters" };
            }
            if (!/[A-Z]/.test(password)) {
                return { valid: false, error: "Password must contain at least one uppercase letter" };
            }
            if (!/[a-z]/.test(password)) {
                return { valid: false, error: "Password must contain at least one lowercase letter" };
            }
            if (!/\d/.test(password)) {
                return { valid: false, error: "Password must contain at least one number" };
            }
            if (!/[@$#.]/.test(password)) {
                return { valid: false, error: "Password must contain at least one special character (@, $, #, .)" };
            }
            return { valid: true, error: "" };
        }
        
        // Clear error messages
        function clearErrors() {
            document.getElementById('currentPasswordError').textContent = '';
            document.getElementById('newPasswordError').textContent = '';
            document.getElementById('confirmPasswordError').textContent = '';
            document.getElementById('message').textContent = '';
        }
        
        // Handle form submission
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();
            
            const currentUser = getCurrentUser();
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('changePasswordBtn');
            
            // Validate new password
            const validation = validatePassword(newPassword);
            if (!validation.valid) {
                document.getElementById('newPasswordError').textContent = validation.error;
                return;
            }
            
            // Check if passwords match
            if (newPassword !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
                return;
            }
            
            // Disable button during submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Changing Password...';
            
            try {
                const response = await fetch(`${API_BASE}/employees/change-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        emp_id: currentUser.emp_id,
                        current_password: currentPassword,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('message').textContent = 'Password changed successfully! Redirecting...';
                    
                    // Update current user data to remove must_change_password flag
                    if (window.OfficeApp && window.OfficeApp.updateCurrentUser) {
                        window.OfficeApp.updateCurrentUser({ must_change_password: false });
                    }
                    
                    // Redirect to dashboard after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'employee_dashboard.html';
                    }, 2000);
                } else {
                    document.getElementById('currentPasswordError').textContent = data.error || 'Failed to change password';
                }
            } catch (error) {
                document.getElementById('currentPasswordError').textContent = 'Network error. Please try again.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Change Password';
            }
        });
        
        // Real-time password validation
        document.getElementById('newPassword').addEventListener('input', (e) => {
            const password = e.target.value;
            const validation = validatePassword(password);
            
            if (password && !validation.valid) {
                document.getElementById('newPasswordError').textContent = validation.error;
            } else {
                document.getElementById('newPasswordError').textContent = '';
            }
        });
        
        // Check password match
        document.getElementById('confirmPassword').addEventListener('input', (e) => {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = e.target.value;
            
            if (confirmPassword && newPassword !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
            } else {
                document.getElementById('confirmPasswordError').textContent = '';
            }
        });
        
        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            // If user is admin, redirect to admin dashboard
            if (user.role === 'Admin') {
                window.location.href = 'admin_dashboard.html';
                return;
            }
        });
    </script>
</body>
</html>
