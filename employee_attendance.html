<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attendance • OffiAttend</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .attendance-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }

    .attendance-title {
      font-size: var(--font-size-3xl);
      font-weight: 800;
      color: var(--text-dark);
    }

    .emp-info-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }

    .emp-info-card {
      background: var(--bg-lighter);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .emp-info-card .icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(139, 92, 246, 0.15));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-from);
    }

    .emp-info-card .label {
      font-size: var(--font-size-xs);
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .emp-info-card .value {
      font-weight: 700;
      color: var(--text-dark);
    }

    .emp-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--gradient-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-2xl);
      font-weight: 800;
    }

    .metrics-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }

    .metric-card {
      background: var(--bg-lighter);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .metric-card .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(139, 92, 246, 0.2));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-from);
    }

    .metric-card .label {
      font-size: var(--font-size-sm);
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .metric-card .value {
      font-size: var(--font-size-xl);
      font-weight: 800;
      color: var(--text-dark);
    }

    .attendance-table-card {
      background: var(--bg-lighter);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .attendance-table-card .card-header {
      padding: var(--space-lg) var(--space-xl);
      border-bottom: 1px solid var(--border-lighter);
    }

    .table-wrap table {
      width: 100%;
      border-collapse: collapse;
    }

    .table-wrap th {
      text-align: left;
      padding: 14px 16px;
      font-size: var(--font-size-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-light);
      background: var(--bg-light);
    }

    .table-wrap td {
      padding: 14px 16px;
      border-top: 1px solid var(--border-lighter);
    }

    .table-wrap tr:hover {
      background: rgba(6, 182, 212, 0.04);
    }

    .pagination-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-xl);
      border-top: 1px solid var(--border-lighter);
      font-size: var(--font-size-sm);
      color: var(--text-light);
    }

    .date-formatted {
      font-weight: 600;
      color: var(--text-dark);
    }

    .attendance-title {
      color: var(--primary-from);
    }

    /* Sky blue color for h1 */
    .attendance-header-bar>div[style*="display:flex"]>label {
      color: var(--text-light);
    }

    /* Grey for labels */
  </style>
</head>

<body data-requires-auth="true">
  <button class="mobile-menu-toggle" aria-label="Toggle menu">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <div class="mobile-overlay"></div>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <div class="page">
        <div class="container">
          <div class="page-header">
            <div>
              <h1 class="page-title">Attendance</h1>
              <p class="page-subtitle">Personal attendance logs and statistics</p>
            </div>
            <div style="display:flex; gap: var(--space-sm); align-items:center;">
              <label class="label" style="margin:0; font-weight:600; color:var(--text-light);">Month</label>
              <input id="filter_month" type="month" class="field" style="max-width:220px;" />
            </div>
          </div>

          <div class="metrics-cards">

            <div class="metric-card">
              <div class="icon-wrap"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2">
                  <circle cx="12" cy="12" r="10" />
                  <polyline points="12 6 12 12 16 14" />
                </svg></div>
              <div>
                <div class="label attendance-text-muted">Your Avg In Time</div>
                <div class="value" data-avg-in>Calculating...</div>
              </div>
            </div>
            <div class="metric-card">
              <div class="icon-wrap"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2">
                  <circle cx="12" cy="12" r="10" />
                  <polyline points="12 6 12 12 16 14" />
                </svg></div>
              <div>
                <div class="label attendance-text-muted">Your Avg Out Time</div>
                <div class="value" data-avg-out>Calculating...</div>
              </div>
            </div>

          </div>

          <div class="card fade-in">
            <div class="card-header">
              <div>
                <h2 class="card-title">Attendance Log</h2>
                <div class="card-subtitle">Detailed history of entries and exits for the selected month</div>
              </div>
            </div>
            <div class="card-body">
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Entry Time</th>
                      <th>Exit Time</th>
                      <th>Status</th>
                      <th>Leave Status</th>
                      <th>View</th>
                    </tr>
                  </thead>
                  <tbody data-attendance-tbody>
                    <tr>
                      <td colspan="5" class="muted">Loading…</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
    </main>
  </div>
  <script src="js/app.js"></script>
  <script src="js/pages.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = window.OfficeApp?.currentUser?.();
      if (!user) { window.location.href = "login.html"; return; }
      const isAdmin = (user.role || "").toLowerCase() === "admin";
      if (isAdmin) { window.location.href = "admin_dashboard.html"; return; }

      const API_BASE_URL = window.location.origin + "/api";
      const empId = user.emp_id;
      const monthEl = document.getElementById("filter_month");
      const tbody = document.querySelector("tbody[data-attendance-tbody]");

      const setEl = (sel, text) => { const e = document.querySelector(sel); if (e) e.textContent = text || "—"; };

      function formatDate(d) {
        if (!d) return "—";
        try {
          if (typeof d === 'string' && /^\d{2}-\d{2}-\d{4}$/.test(d)) return d;
          if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
            const [year, month, day] = d.split('-');
            return `${day}-${month}-${year}`;
          }
          return d;
        } catch (e) { return d; }
      }

      function formatTime(t) {
        if (!t || t === "—") return "—";
        return String(t);
      }

      function timeToMinutes(t) {
        if (!t || t === "—") return null;
        const parts = String(t).trim().split(/[:.]/);
        if (parts.length >= 2) return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
        return null;
      }

      function minutesToTime(m) {
        const h = Math.floor(m / 60), min = m % 60;
        return (h < 10 ? "0" : "") + h + ":" + (min < 10 ? "0" : "") + min;
      }

      function loadAttendance() {
        const now = new Date();
        const ym = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
        const month = (monthEl?.value || ym).trim();
        if (!month) return;

        tbody.innerHTML = "<tr><td colspan=\"6\" class=\"muted\" style=\"text-align:center; padding: var(--space-xl);\">Loading…</td></tr>";

        fetch(`${API_BASE_URL}/attendance?emp_id=${encodeURIComponent(empId)}&month=${month}`)
          .then(r => r.json())
          .then(d => {
            const rows = (d.success && d.attendance) ? d.attendance : [];

            // Calculate Average Times
            const presentRows = rows.filter(r => {
              const status = (r.status || "").toLowerCase();
              return (status === "present" || status === "late") && (r.in_time && r.in_time !== "—");
            });

            if (presentRows.length > 0) {
              let inMins = 0, outMins = 0;
              presentRows.forEach(r => {
                const inM = timeToMinutes(r.in_time), outM = timeToMinutes(r.out_time);
                if (inM != null) inMins += inM;
                if (outM != null) outMins += outM;
              });
              setEl("[data-avg-in]", minutesToTime(Math.round(inMins / presentRows.length)));
              setEl("[data-avg-out]", presentRows.filter(r => r.out_time && r.out_time !== "—").length ?
                minutesToTime(Math.round(outMins / presentRows.filter(r => r.out_time && r.out_time !== "—").length)) : "—");
            } else {
              setEl("[data-avg-in]", "—");
              setEl("[data-avg-out]", "—");
            }

            const fmtBadge = (s) => {
              const badgeClass = (s || "").toLowerCase();
              return `<span class="badge badge-${badgeClass}">${s || "—"}</span>`;
            };

            tbody.innerHTML = rows.length ? rows.map(r => {
              const leaveStatus = r.leave_status || 'Not Applied';
              let leaveBadgeClass = 'badge-pending';
              if (leaveStatus === 'Approved') {
                leaveBadgeClass = 'badge-present';
              } else if (leaveStatus === 'Rejected') {
                leaveBadgeClass = 'badge-absent';
              } else if (leaveStatus === 'Pending') {
                leaveBadgeClass = 'badge-pending';
              }
              
              return `
                    <tr>
                      <td class="date-formatted">${formatDate(r.att_date || r.date)}</td>
                      <td>${formatTime(r.in_time)}</td>
                      <td>${formatTime(r.out_time)}</td>
                      <td>${fmtBadge(r.status)}</td>
                      <td><span class="badge ${leaveBadgeClass}">${leaveStatus}</span></td>
                      <td>
                          <button class="btn btn-gradient-primary btn-sm" onclick="showAttendanceDetails('${r.att_date}', '${empId}')">
                             <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                               <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                               <circle cx="12" cy="12" r="3"></circle>
                           </svg>
                           View 
                         </button>
                      </td>
                    </tr>
                    <tr id="detail_row_${empId}_${r.att_date}" style="display: none;">
                      <td colspan="6" style="padding: 0;">
                        <div class="detail-content" style="padding: 20px; border-left: 4px solid var(--primary-from); background: var(--bg-light);">
                          <div id="scan_logs_${empId}_${r.att_date}">Loading details...</div>
                        </div>
                      </td>
                    </tr>
                  `;
            }).join("") : '<tr><td colspan="6" class="muted" style="text-align:center; padding: var(--space-xl);">No records for this month</td></tr>';
          })
          .catch(() => {
            tbody.innerHTML = '<tr><td colspan="5" class="muted" style="text-align:center; padding: var(--space-xl); color:#b91c1c;">Connection error</td></tr>';
          });
      }

      const now = new Date();
      if (monthEl && !monthEl.value) monthEl.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      monthEl?.addEventListener("change", loadAttendance);
      loadAttendance();

      function showAttendanceDetails(date, empId) {
        document.querySelectorAll('[id^="detail_row_"]').forEach(row => {
          if (row.id !== `detail_row_${empId}_${date}`) row.style.display = 'none';
        });
        const detailRow = document.getElementById(`detail_row_${empId}_${date}`);
        if (detailRow.style.display === 'none' || detailRow.style.display === '') {
          detailRow.style.display = 'table-row';
          loadScanLogs(date, empId);
        } else {
          detailRow.style.display = 'none';
        }
      }

      function loadScanLogs(date, empId) {
        const logsContainer = document.getElementById(`scan_logs_${empId}_${date}`);
        if (!logsContainer) return;

        logsContainer.innerHTML = 'Loading scan logs...';

        fetch(`${API_BASE_URL}/attendance/logs?emp_id=${empId}&date=${date}`)
          .then(r => r.json())
          .then(data => {
            if (data.success && data.metadata) {
              const m = data.metadata;
              const sortedLogs = data.logs.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
              const entryLogs = sortedLogs.filter(log => log.action === 'ENTRY');
              const exitLogs = sortedLogs.filter(log => log.action === 'EXIT');

              let pairedHtml = '<div style="display: flex; gap: 20px;"><div style="flex: 1;"><h5 style="color: #16a34a; margin-bottom: 10px;">Entry Times</h5>';
              let exitHtml = '<div style="flex: 1;"><h5 style="color: #dc2626; margin-bottom: 10px;">Exit Times</h5>';

              if (entryLogs.length === 0) {
                pairedHtml += '<p style="color: #999;">No entry scans</p>';
              } else {
                entryLogs.forEach((entry, index) => {
                  pairedHtml += `<div style="padding: 8px; margin-bottom: 5px; background: rgba(34, 197, 94, 0.1); border-radius: 4px;">${formatTime(entry.created_at)}</div>`;

                  if (index < exitLogs.length) {
                    exitHtml += `<div style="padding: 8px; margin-bottom: 5px; background: rgba(239, 68, 68, 0.1); border-radius: 4px;">${formatTime(exitLogs[index].created_at)}</div>`;
                  } else {
                    exitHtml += `<div style="padding: 8px; margin-bottom: 5px; background: rgba(239, 68, 68, 0.1); border-radius: 4px; color: #999;">—</div>`;
                  }
                });
              }

              if (exitLogs.length > entryLogs.length) {
                for (let i = entryLogs.length; i < exitLogs.length; i++) {
                  pairedHtml += `<div style="padding: 8px; margin-bottom: 5px; background: rgba(34, 197, 94, 0.1); border-radius: 4px; color: #999;">—</div>`;
                  exitHtml += `<div style="padding: 8px; margin-bottom: 5px; background: rgba(239, 68, 68, 0.1); border-radius: 4px;">${formatTime(exitLogs[i].created_at)}</div>`;
                }
              }

              if (entryLogs.length === 0 && exitLogs.length === 0) {
                logsContainer.innerHTML = '<p style="color: #999;">No scan logs found</p>';
                return;
              }

              pairedHtml += '</div>' + exitHtml + '</div>';

              logsContainer.innerHTML = `
                ${pairedHtml}
              `;
            } else {
              logsContainer.innerHTML = '<p>No details found</p>';
            }
          })
          .catch(error => {
            logsContainer.innerHTML = '<p>Error loading details</p>';
          });
      }

      window.showAttendanceDetails = showAttendanceDetails;
      window.loadScanLogs = loadScanLogs;
    });
  </script>
</body>

</html>
