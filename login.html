<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • OffiAttend</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gradient-bg);
      padding: var(--space-lg);
    }

    .login-container {
      width: 100%;
      max-width: 480px;
    }

    .login-card {
      animation: fadeInUp 0.5s ease-out;
    }

    .logo-container {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .logo-circle {
      width: 80px;
      height: 80px;
      margin: 0 auto var(--space-md);
      border-radius: var(--radius-xl);
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: var(--font-size-3xl);
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(6, 182, 212, 0.4);
    }

    .login-title {
      font-size: var(--font-size-3xl);
      font-weight: 800;
      text-align: center;
      margin-bottom: var(--space-sm);
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-subtitle {
      text-align: center;
      color: var(--text-light);
      margin-bottom: var(--space-xl);
    }

    .demo-credentials {
      background: rgba(6, 182, 212, 0.05);
      border: 1px solid rgba(6, 182, 212, 0.2);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-lg);
      font-size: var(--font-size-sm);
      text-align: center;
    }

    .demo-credentials strong {
      color: var(--primary-from);
    }

    .error-message {
      padding: var(--space-md);
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-md);
      color: #dc2626;
      font-size: var(--font-size-sm);
      font-weight: 600;
      text-align: center;
      margin-top: var(--space-md);
      display: none;
    }

    .error-message.show {
      display: block;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="glass-card login-card">
      <div class="logo-container">
        <div class="logo-circle">OA</div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to your account</p>
      </div>


      <form class="form" data-login>
        <div class="field">
          <label class="label" for="emp_id">User ID</label>
          <input id="emp_id" name="emp_id" type="text" autocomplete="username" placeholder="Enter your user ID"
            required />
        </div>

        <div class="field">
          <label class="label" for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password"
            placeholder="Enter your password" required />
        </div>

        <button class="btn btn-gradient-primary btn-full btn-lg" type="submit">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
          Sign In
        </button>

        <div class="error-message" data-error></div>
      </form>

      <div style="text-align: center;">
        <a href="index.html" class="back-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Back to Home
        </a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/responsive.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
